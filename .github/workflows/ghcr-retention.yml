name: GHCR retention

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC

permissions:
  packages: write
  contents: read

jobs:
  prune:
    name: Prune old GHCR versions
    runs-on: ubuntu-latest
    steps:
      # Step 1: Prune from the full version pool, but preserve `latest`.
      # Always keeps the 5 most recent versions regardless of tag, so the
      # last 5 sha-* tagged builds survive for rollback.
      - name: Prune tagged + untagged (keep latest + last 5)
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: '^latest$'

      # Step 2: cosign-/attestation-aware cleanup of untagged versions.
      # docker-publish pushes a cosign signature + SBOM/provenance attestations
      # as extra untagged referrer manifests; deleting an image cascade-deletes
      # its referrers, so the generic delete-package-versions action then tries
      # to delete a child manifest GHCR already removed ("Package version not
      # found"). dataaxiom safely handles multi-arch, attestation, and Sigstore
      # cosign referrers.
      - name: Prune untagged (cosign/attestation aware, keep last 5)
        uses: dataaxiom/ghcr-cleanup-action@v1.2.1
        with:
          package: ${{ github.event.repository.name }}
          delete-untagged: true
          keep-n-untagged: 5
          token: ${{ secrets.GITHUB_TOKEN }}
