name: Supply chain scan

on:
  workflow_call:
    secrets:
      SOCKET_SECURITY_API_KEY:
        # Not marked required: bot-authored PRs (Dependabot security updates,
        # Renovate) run in an isolated context without access to repo secrets.
        # With required: true the reusable-workflow call fails before any job
        # runs; required: false lets the rest of the scan run, and the Socket
        # step below self-skips when the secret is absent.
        required: false

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Job-level env so the Socket step's `if:` can test for the secret's
    # presence (a step's own env isn't visible to its own `if:`, and the
    # `secrets` context can't be referenced in an `if:` directly).
    env:
      SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps (no scripts)
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Verify npm package signatures
        working-directory: frontend
        run: npm audit signatures

      - name: Socket Security scan (frontend)
        if: ${{ env.SOCKET_SECURITY_API_KEY != '' }}
        run: |
          # Socket repo slug must not contain a slash; strip the owner prefix.
          # On pull_request, GITHUB_REF_NAME is "<pr>/merge"; prefer the head ref.
          repo_slug="${GITHUB_REPOSITORY##*/}"
          branch_name="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          npx -y @socketsecurity/cli@latest scan create \
            --org grecolabs \
            --repo "${repo_slug}" \
            --branch "${branch_name}" \
            --report \
            ./frontend

      - name: OSV scan (npm + cargo lockfiles)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --recursive
            ./

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@cargo-audit

      - name: cargo audit (backend)
        working-directory: backend
        run: cargo audit
