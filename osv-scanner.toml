# osv-scanner configuration
# Auto-loaded by google/osv-scanner-action when present at the repo root.
# Docs: https://google.github.io/osv-scanner/configuration/

[[IgnoredVulns]]
id = "RUSTSEC-2023-0071"
ignoreUntil = 2026-11-23
# rsa 0.9.10 (Marvin Attack timing side-channel) is pulled in transitively
# only because the `sqlx` umbrella crate lists `sqlx-mysql` as an optional
# dependency. Our backend pins `sqlx` with `default-features = false` and
# only the `postgres` feature, so `sqlx-mysql` and `rsa` are NOT compiled
# into the binary. Verified: `cargo tree -i rsa` returns "nothing to print".
# The vulnerability requires actually performing RSA decryption, which we
# never do. Re-evaluate when RustSec publishes a fix or when sqlx upstream
# refactors its lockfile structure (tracked in launchbadge/sqlx#2911).
reason = "rsa is in Cargo.lock via sqlx-mysql optional dep but not compiled; postgres-only feature set"
